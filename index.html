<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1on1 대화 스타일 진단 | 리더의 대화에도 스타일이 있습니다</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f7f7f5;
      --color-bg-tertiary: #f0efeb;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #5a5a5a;
      --color-text-tertiary: #999990;
      --color-border: rgba(0,0,0,0.1);
      --color-border-md: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    html, body {
      min-height: 100%;
      background: #f0efeb;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      color: var(--color-text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .app-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: var(--color-bg);
      border-radius: var(--radius-xl);
      border: 0.5px solid var(--color-border);
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── INTRO ── */
    .intro-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      text-align: center;
      margin-bottom: 1rem;
    }
    .intro-title {
      font-size: 26px;
      font-weight: 500;
      color: var(--color-text-primary);
      text-align: center;
      line-height: 1.45;
      margin-bottom: 0.65rem;
    }
    .intro-copy {
      font-size: 14px;
      color: var(--color-text-secondary);
      text-align: center;
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    .flow-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.75rem;
    }
    .flow-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 110px;
    }
    .flow-icon {
      width: 48px;
      height: 48px;
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-lg);
      background: var(--color-bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .flow-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--color-text-secondary);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .flow-label { font-size: 12px; color: var(--color-text-secondary); text-align: center; line-height: 1.4; }
    .flow-sub { font-size: 11px; color: var(--color-text-tertiary); text-align: center; }
    .flow-arrow { color: var(--color-text-tertiary); font-size: 14px; margin: 0 2px; padding-bottom: 22px; }

    .meta-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .meta-pill {
      font-size: 12px;
      color: var(--color-text-tertiary);
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border);
      border-radius: 999px;
      padding: 5px 14px;
    }

    .intro-notice {
      font-size: 13px;
      color: var(--color-text-secondary);
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      text-align: center;
      line-height: 1.75;
      margin-bottom: 1.75rem;
    }
    .notice-em { color: var(--color-text-primary); font-weight: 500; }

    .start-btn {
      display: block;
      width: 100%;
      background: var(--color-text-primary);
      color: var(--color-bg);
      border: none;
      border-radius: var(--radius-lg);
      padding: 15px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .start-btn:hover { opacity: 0.82; }

    /* ── QUIZ ── */
    .q-progress-bar {
      height: 3px;
      background: var(--color-border);
      border-radius: 2px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .q-progress-fill {
      height: 100%;
      background: var(--color-text-primary);
      border-radius: 2px;
      transition: width 0.35s ease;
    }
    .q-counter { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 0.4rem; }
    .q-category {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-bottom: 0.75rem;
    }
    .q-text {
      font-size: 16px;
      color: var(--color-text-primary);
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    .scale-row { display: flex; flex-direction: column; gap: 8px; }
    .scale-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--color-bg);
      user-select: none;
    }
    .scale-option:hover { border-color: var(--color-border-md); background: var(--color-bg-secondary); }
    .scale-option.selected { border-color: var(--color-text-primary); background: var(--color-bg-secondary); }
    .scale-num { font-size: 15px; font-weight: 500; color: var(--color-text-primary); min-width: 20px; }
    .scale-label { font-size: 13px; color: var(--color-text-secondary); }

    .q-nav { margin-top: 1.25rem; }
    .prev-btn {
      background: transparent;
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-md);
      padding: 9px 22px;
      font-size: 14px;
      cursor: pointer;
      color: var(--color-text-primary);
      transition: background 0.15s;
      font-family: inherit;
    }
    .prev-btn:hover { background: var(--color-bg-secondary); }
    .prev-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── RESULT ── */
    .radar-wrap { margin: 0 auto 1.5rem; max-width: 300px; }
    .radar-wrap canvas { width: 100% !important; height: 270px !important; }

    .result-badge { text-align: center; margin-bottom: 1.5rem; }
    .badge-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-bottom: 0.4rem;
    }
    .badge-name { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
    .badge-style { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }

    .tab-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .style-tab {
      padding: 7px 14px;
      font-size: 13px;
      border: 0.5px solid var(--color-border);
      border-radius: 999px;
      cursor: pointer;
      background: var(--color-bg);
      color: var(--color-text-secondary);
      transition: all 0.15s;
      font-family: inherit;
    }
    .style-tab:hover { border-color: var(--color-border-md); }
    .style-tab.active { background: var(--color-text-primary); color: var(--color-bg); border-color: var(--color-text-primary); }
    .my-badge {
      font-size: 10px;
      background: var(--color-bg-secondary);
      color: var(--color-text-tertiary);
      border-radius: 999px;
      padding: 1px 6px;
      margin-left: 4px;
    }
    .style-tab.active .my-badge { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.75); }

    .result-section {
      margin-bottom: 1rem;
      padding: 1rem 1.25rem;
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
    }
    .section-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin-bottom: 0.6rem;
    }
    .section-body { font-size: 14px; color: var(--color-text-secondary); line-height: 1.8; }

    .q-list { list-style: none; }
    .q-list li {
      font-size: 14px;
      color: var(--color-text-secondary);
      padding: 8px 0;
      border-bottom: 0.5px solid var(--color-border);
      line-height: 1.6;
    }
    .q-list li:last-child { border-bottom: none; }
    .q-list li::before { content: "Q. "; font-weight: 500; color: var(--color-text-primary); }

    .retry-btn {
      display: block;
      margin: 1.25rem auto 0;
      background: transparent;
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-md);
      padding: 10px 24px;
      font-size: 13px;
      cursor: pointer;
      color: var(--color-text-secondary);
      font-family: inherit;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: var(--color-bg-secondary); }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem 2rem; }
      .intro-title { font-size: 22px; }
      .flow-step { width: 90px; }
    }
  </style>
</head>
<body>
<div class="app-wrap">
  <div class="card">

    <!-- INTRO -->
    <div id="screen-intro" class="screen active">
      <div class="intro-eyebrow">1on1 대화 스타일 진단</div>
      <div class="intro-title">리더의 대화에도<br>스타일이 있습니다</div>
      <div class="intro-copy">어떤 스타일로 구성원과 대화하고 있는지<br>지금 확인해보세요.</div>

      <div class="flow-wrap">
        <div class="flow-step">
          <div class="flow-icon">
            <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
          </div>
          <div class="flow-label">20문항 응답</div>
          <div class="flow-sub">약 5분</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
          <div class="flow-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          </div>
          <div class="flow-label">자동 분석</div>
          <div class="flow-sub">4가지 스타일</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">
          <div class="flow-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 017 7c0 4-3.5 7-7 10C8.5 16 5 13 5 9a7 7 0 017-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          </div>
          <div class="flow-label">나의 스타일 확인</div>
          <div class="flow-sub">별명 + 해석</div>
        </div>
      </div>

      <div class="meta-row">
        <div class="meta-pill">5점 척도</div>
        <div class="meta-pill">총 20문항</div>
        <div class="meta-pill">소요시간 약 5분</div>
      </div>

      <div class="intro-notice">
        <span class="notice-em">정답은 없어요.</span><br>
        이상적인 모습보다 요즘 나의 모습을 떠올리며<br>편하게 응답해 주세요.
      </div>

      <button class="start-btn" onclick="startDiag()">진단 시작하기</button>
    </div>

    <!-- QUIZ -->
    <div id="screen-quiz" class="screen">
      <div class="q-progress-bar"><div class="q-progress-fill" id="prog"></div></div>
      <div class="q-counter" id="q-counter"></div>
      <div class="q-category" id="q-cat"></div>
      <div class="q-text" id="q-text"></div>
      <div class="scale-row" id="scale-row"></div>
      <div class="q-nav">
        <button class="prev-btn" id="btn-prev" onclick="prevQ()">이전</button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="screen-result" class="screen">
      <div class="radar-wrap">
        <canvas id="radarChart" role="img" aria-label="나의 1on1 스타일 레이더 차트"></canvas>
      </div>
      <div class="result-badge">
        <div class="badge-label" id="res-badge-label">나의 별명</div>
        <div class="badge-name" id="res-badge-name"></div>
        <div class="badge-style" id="res-badge-style"></div>
      </div>
      <div class="tab-row" id="tab-row"></div>
      <div class="result-section">
        <div class="section-title">스타일 해석</div>
        <div class="section-body" id="res-interp"></div>
      </div>
      <div class="result-section">
        <div class="section-title">이런 구성원에게 잘 맞아요</div>
        <div class="section-body" style="font-size:13px; color:var(--color-text-tertiary); margin-bottom:0.5rem;">이 스타일은 이런 구성원을 만났을 때 특히 빛을 발해요.</div>
        <div class="section-body" id="res-member"></div>
      </div>
      <div class="result-section">
        <div class="section-title">지금 당장 써볼 수 있는 질문 3가지</div>
        <ul class="q-list" id="res-questions"></ul>
      </div>
      <div class="result-section" id="second-style-section" style="border-style: dashed;">
        <div class="section-title">사실 이런 면도 있어요</div>
        <div class="section-body" id="res-second"></div>
      </div>
      <button class="retry-btn" onclick="restart()">처음부터 다시하기</button>
    </div>

  </div>
</div>

<script>
const SECOND_COMMENTS = {
  mentoring: { to: 'empowering', text: '사실 당신 안에는 "날개를 달아주는 리더"의 면도 살아있어요. 가끔 구성원에게 먼저 물어보고 싶은 마음, 느껴본 적 있지 않나요? 그 순간이 바로 그 가능성이에요.' },
  empowering: { to: 'consultative', text: '사실 당신 안에는 "함께 생각하는 파트너"의 면도 살아있어요. 구성원의 문제를 같이 분석하고 싶은 마음, 충분히 갖고 계세요. 그 본능을 조금 더 믿어보세요.' },
  teaching: { to: 'mentoring', text: '사실 당신 안에는 "길을 먼저 걸은 선배"의 면도 살아있어요. 가끔 내 경험을 나눠주고 싶은 마음이 올라올 때, 그냥 꺼내보세요. 구성원에게 큰 힘이 될 거예요.' },
  consultative: { to: 'teaching', text: '사실 당신 안에는 "기준을 세워주는 코치"의 면도 살아있어요. 때로는 명확한 방향 하나가 구성원에게 가장 필요한 것일 수 있어요. 분석보다 방향이 먼저일 때도 있거든요.' }
};

const STYLES = [
  { key: 'mentoring', name: '길을 먼저 걸은 선배', label: '멘토링',
    interp: '당신은 구성원 곁에서 먼저 걸어온 길을 나눠주는 리더예요. "나도 그런 시간이 있었어"라는 말 한마디가 구성원에게 얼마나 큰 위로와 방향이 되는지 아마 알고 계실 거예요. 경험에서 우러난 이야기는 어떤 교과서보다 진합니다. 특히 처음 사회생활을 시작하거나, 아직 자기 방향이 뚜렷하지 않은 구성원에게 이 대화 방식은 든든한 나침반이 되어줘요.',
    member: '아직 경험이 많지 않지만 의욕과 열의가 넘치는 구성원에게 잘 어울려요. 스스로의 방향을 찾고 싶어 하지만 막연함을 느끼는 분, 또는 처음 맡는 역할 앞에서 긴장하고 있는 구성원과 함께할 때 이 방식이 빛을 발합니다.',
    questions: ['비슷한 상황에서 내가 어떻게 헤쳐나갔는지 이야기해도 될까요?', '지금 이 경험이 앞으로 어떤 자산이 될 것 같은지, 같이 생각해볼까요?', '이 역할을 통해 어떤 사람으로 성장하고 싶어요?'] },
  { key: 'empowering', name: '날개를 달아주는 리더', label: '위임',
    interp: '당신은 구성원이 스스로 날 수 있다고 믿는 리더예요. 답을 먼저 꺼내기보다, 구성원이 스스로 생각할 수 있는 공간을 만들어주는 것을 자연스럽게 하고 있어요. 이런 대화는 단기적으로는 느려 보일 수 있지만, 결국 구성원이 주체적으로 성장하게 만드는 가장 강력한 방식이기도 해요. 구성원의 말을 끝까지 듣는 것, 그것 자체가 이미 훌륭한 리더십입니다.',
    member: '역량도 있고 자기 생각도 분명한 구성원에게 잘 맞아요. 이미 어느 정도 성과를 내고 있지만, 더 큰 도전이 필요한 분이거나 스스로 결정하고 싶어 하는 구성원과 함께할 때 이 방식이 진가를 발휘합니다.',
    questions: ['지금 이 상황에서 본인은 어떻게 하고 싶어요?', '선택지가 있다면 어떤 것들이 있을 것 같아요?', '이 결정을 내리는 데 가장 중요하게 생각하는 게 뭐예요?'] },
  { key: 'teaching', name: '기준을 세워주는 코치', label: '티칭',
    interp: '당신은 구성원에게 "잘하는 것이 어떤 것인지"를 명확하게 알려주는 리더예요. 기대 수준을 분명히 전달하고, 방향이 흔들릴 때 다시 잡아주는 역할을 자연스럽게 해내고 있어요. 이 방식은 특히 아직 기준점이 없는 구성원에게 큰 안정감을 줍니다. 명확함은 때로 가장 따뜻한 배려가 될 수 있거든요.',
    member: '이제 막 합류했거나 새로운 업무를 시작한 구성원에게 잘 맞아요. 무엇을 어떻게 해야 할지 아직 감이 없는 상태이거나, 피드백을 받고 싶어 하지만 먼저 요청하기 어려워하는 구성원과 함께할 때 효과적입니다.',
    questions: ['이번 업무에서 기대하는 수준을 구체적으로 이야기해줄게요, 괜찮아요?', '지금까지 한 것 중 잘된 부분과 보완할 부분을 같이 짚어볼까요?', '다음에는 이렇게 해보면 어떨까요? 어떻게 생각해요?'] },
  { key: 'consultative', name: '함께 생각하는 파트너', label: '컨설팅',
    interp: '당신은 구성원과 나란히 앉아 문제를 같이 들여다보는 리더예요. 답을 던져주기보다 함께 분석하고, 선택지를 같이 탐색하는 방식으로 대화를 이어가고 있어요. 구성원의 현장 경험과 전문성을 진심으로 존중하기 때문에 이런 대화가 가능한 거예요. 이 방식은 구성원에게 "내 의견이 중요하게 여겨지고 있다"는 느낌을 주는 데 탁월합니다.',
    member: '역량과 경험이 충분히 쌓인 구성원, 혹은 특정 문제 앞에서 막혀 있는 전문가형 구성원에게 잘 어울려요. 이미 스스로 많이 고민했지만 외부 시선이 필요한 상태이거나, 혼자 결정하기에 무거운 사안을 들고 온 구성원과 함께할 때 빛납니다.',
    questions: ['지금 이 문제, 어디서부터 시작된 것 같아요?', '지금까지 생각해본 방법 중에 가장 괜찮아 보이는 건 어떤 건가요?', '제가 도울 수 있는 부분이 있다면 어떤 게 있을까요?'] }
];

const QUESTIONS = [
  { cat: '멘토링', text: '나는 1on1에서 내가 비슷한 상황에서 겪었던 경험이나 실패담을 구성원과 나눈다.' },
  { cat: '멘토링', text: '나는 구성원이 앞으로 어떤 사람으로 성장하면 좋겠는지에 대한 나의 기대와 바람을 직접 이야기한다.' },
  { cat: '멘토링', text: '나는 구성원이 막혀있을 때, 내가 그 상황을 어떻게 돌파했는지 구체적인 방법을 먼저 꺼낸다.' },
  { cat: '멘토링', text: '나는 구성원의 가치관이나 일을 대하는 태도에 대해 내 관점을 솔직하게 이야기한다.' },
  { cat: '멘토링', text: '나는 구성원이 미처 보지 못하는 장기적인 그림(커리어, 성장 방향)을 대화 중에 그려준다.' },
  { cat: '위임', text: '나는 1on1에서 내 의견보다 구성원의 생각을 먼저 듣는 데 더 많은 시간을 쓴다.' },
  { cat: '위임', text: '나는 구성원이 결론을 내리지 못해도, 바로 답을 주지 않고 스스로 생각할 시간을 준다.' },
  { cat: '위임', text: '나는 구성원이 어떤 결정을 내렸을 때, 내 생각과 달라도 그 결정을 존중하고 지지한다.' },
  { cat: '위임', text: '나는 구성원에게 현재 역할보다 더 큰 도전이나 책임을 의도적으로 제안한다.' },
  { cat: '위임', text: '나는 구성원이 스스로 자신의 강점과 성장 포인트를 발견하도록 질문으로 이끈다.' },
  { cat: '티칭', text: '나는 1on1에서 업무 기대 수준이나 평가 기준을 구성원이 명확히 이해하도록 구체적으로 설명한다.' },
  { cat: '티칭', text: '나는 구성원이 실수하거나 부족한 부분이 있을 때, 무엇이 잘못되었는지 직접적으로 짚어준다.' },
  { cat: '티칭', text: '나는 구성원이 어떻게 일해야 하는지, 구체적인 행동 방법이나 절차를 알려준다.' },
  { cat: '티칭', text: '나는 구성원의 업무 진행 상황을 주기적으로 확인하고, 방향이 맞는지 점검하는 대화를 한다.' },
  { cat: '티칭', text: '나는 구성원이 배워야 할 역량이나 지식을 파악하고, 그것을 키울 수 있도록 구체적인 학습 방향을 제시한다.' },
  { cat: '컨설팅', text: '나는 구성원이 문제를 가져왔을 때, 원인이 무엇인지 함께 분석하는 과정을 대화에서 밟는다.' },
  { cat: '컨설팅', text: '나는 구성원에게 한 가지 답을 주기보다, 여러 가지 선택지를 함께 놓고 검토한다.' },
  { cat: '컨설팅', text: '나는 구성원의 판단이나 접근 방식에 대해 동의하지 않을 때도, 내 의견을 일방적으로 강요하지 않고 근거를 들어 대화한다.' },
  { cat: '컨설팅', text: '나는 구성원이 가진 전문성이나 현장 경험을 신뢰하고, 내가 모르는 부분은 솔직히 인정한다.' },
  { cat: '컨설팅', text: '나는 구성원과 대화할 때, 내가 결론을 내리기보다 구성원이 최종 판단을 내리도록 대화를 이끈다.' }
];

const SCALE_LABELS = ['전혀 그렇지 않다', '그렇지 않다', '보통이다', '그렇다', '매우 그렇다'];
let answers = new Array(20).fill(0);
let current = 0;
let radarChart = null;
let activeTab = 0;
let scores = [];
let mainIdx = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startDiag() {
  current = 0;
  answers = new Array(20).fill(0);
  renderQ();
  showScreen('screen-quiz');
}

function renderQ() {
  const q = QUESTIONS[current];
  document.getElementById('prog').style.width = ((current + 1) / 20 * 100) + '%';
  document.getElementById('q-counter').textContent = (current + 1) + ' / 20';
  document.getElementById('q-cat').textContent = q.cat + ' 코칭';
  document.getElementById('q-text').textContent = q.text;
  const row = document.getElementById('scale-row');
  row.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const opt = document.createElement('div');
    opt.className = 'scale-option' + (answers[current] === i ? ' selected' : '');
    opt.innerHTML = `<span class="scale-num">${i}</span><span class="scale-label">${SCALE_LABELS[i - 1]}</span>`;
    opt.onclick = () => selectAnswer(i);
    row.appendChild(opt);
  }
  document.getElementById('btn-prev').disabled = current === 0;
}

function selectAnswer(val) {
  answers[current] = val;
  renderQ();
  setTimeout(() => {
    if (current < 19) { current++; renderQ(); }
    else showResult();
  }, 300);
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function showResult() {
  scores = [
    answers.slice(0, 5).reduce((a, b) => a + b, 0),
    answers.slice(5, 10).reduce((a, b) => a + b, 0),
    answers.slice(10, 15).reduce((a, b) => a + b, 0),
    answers.slice(15, 20).reduce((a, b) => a + b, 0)
  ];
  mainIdx = scores.indexOf(Math.max(...scores));
  activeTab = mainIdx;
  renderRadar();
  renderTabs();
  renderTabContent(activeTab);
  showScreen('screen-result');
}

function renderRadar() {
  if (radarChart) { radarChart.destroy(); }
  const labelColor = '#666';
  const gridColor = 'rgba(0,0,0,0.1)';
  const dataColor = 'rgba(40,40,40,0.75)';
  const dataFill = 'rgba(40,40,40,0.08)';
  const ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['멘토링', '위임', '티칭', '컨설팅'],
      datasets: [{
        data: scores,
        backgroundColor: dataFill,
        borderColor: dataColor,
        borderWidth: 1.5,
        pointBackgroundColor: dataColor,
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 25,
          ticks: { stepSize: 5, font: { size: 10 }, color: labelColor, backdropColor: 'transparent' },
          grid: { color: gridColor },
          pointLabels: { font: { size: 12, weight: '500' }, color: labelColor },
          angleLines: { color: gridColor }
        }
      }
    }
  });
}

function renderTabs() {
  const row = document.getElementById('tab-row');
  row.innerHTML = '';
  STYLES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'style-tab' + (i === activeTab ? ' active' : '');
    btn.innerHTML = s.label + (i === mainIdx ? '<span class="my-badge">나의 스타일</span>' : '');
    btn.onclick = () => {
      activeTab = i;
      document.querySelectorAll('.style-tab').forEach((b, j) => b.classList.toggle('active', j === i));
      renderTabContent(i);
    };
    row.appendChild(btn);
  });
}

function renderTabContent(idx) {
  const s = STYLES[idx];
  const isMain = idx === mainIdx;
  document.getElementById('res-badge-label').textContent = isMain ? '나의 별명' : '또 다른 스타일';
  document.getElementById('res-badge-name').textContent = s.name;
  document.getElementById('res-badge-style').textContent = s.label + ' 코칭';
  document.getElementById('res-interp').textContent = s.interp;
  document.getElementById('res-member').textContent = s.member;
  const ql = document.getElementById('res-questions');
  ql.innerHTML = '';
  s.questions.forEach(q => {
    const li = document.createElement('li');
    li.textContent = q;
    ql.appendChild(li);
  });
  const secondSection = document.getElementById('second-style-section');
  if (isMain) {
    const comment = SECOND_COMMENTS[s.key];
    document.getElementById('res-second').textContent = comment ? comment.text : '';
    secondSection.style.display = 'block';
  } else {
    secondSection.style.display = 'none';
  }
}

function restart() {
  answers = new Array(20).fill(0);
  current = 0;
  showScreen('screen-intro');
}
</script>
</body>
</html>
